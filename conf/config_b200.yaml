# SENTINEL — B200 FLAGSHIP config (one model per GPU, GPUs 0-3).
#
# Produces the core multi-model PhD result FAST: the 5-condition ASR learning curves,
# ASR-AULC, detector quality (recall / FPR / per-class F1), security-utility tradeoff, and
# cross-threat transfer — for each model. Aggregating these across models yields the
# model x condition two-way ANOVA (`sentinel aggregate`).
#
# Evolution / ablation run in parallel via config_b200_evo.yaml on GPUs 4-7; robustness is a
# separate later run (it is latency-heavy and not needed for the flagship H1 claim).
#
# Pipeline is latency-bound (one probe at a time), so keep generation short.
defaults:
  - model: qwen3_14b
  - _self_

seed: 0
output_dir: experiments/runs
log_level: INFO

encoder:
  model_name: intfloat/e5-large-v2
  device: cuda
  batch_size: 128

corpus:
  kind: builtin
  jsonl_path: null
  repeat: 5                # 60 probes across the 10 classes
  held_out_classes: []

solve:
  max_tokens: 128          # short outputs: the oracle reads refusal/compliance at the start

experiment:
  conditions: [vanilla, static_filter, reflection_defense, meta_defense, full_sentinel]
  window: 10
  seeds: [0, 1, 2]         # 3 seeds -> ANOVA / significance
  bootstrap: 10000
  run_evolution: false     # done in parallel by config_b200_evo.yaml
  run_ablation: false      # done in parallel by config_b200_evo.yaml
  run_robustness: false    # run separately (latency-heavy)

evolution:
  population_size: 6
  offspring_per_gen: 3
  generations: 4
  eval_probes: 18
  bypass_trigger: 5
  human_gate: policy
