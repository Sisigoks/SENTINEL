# SENTINEL — B200 EVOLUTION + ABLATION config (one model per GPU, GPUs 4-7).
#
# Runs the defensive-evolution loop (the architectural novelty) and the ablation grid for
# each model, in parallel with the flagship runs on GPUs 0-3. Writes to a separate output
# dir so it does not collide with the flagship results.
defaults:
  - model: qwen3_14b
  - _self_

seed: 0
output_dir: experiments/runs_evo
log_level: INFO

encoder:
  model_name: intfloat/e5-large-v2
  device: cuda
  batch_size: 128

corpus:
  kind: builtin
  jsonl_path: null
  repeat: 5
  held_out_classes: []

solve:
  max_tokens: 128

experiment:
  conditions: [vanilla, static_filter, reflection_defense, meta_defense, full_sentinel]
  window: 10
  seeds: [0]               # one seed: evolution + ablation are the point here, not seed stats
  bootstrap: 10000
  run_evolution: true
  run_ablation: true
  run_robustness: false

evolution:
  population_size: 8
  offspring_per_gen: 4
  generations: 6
  eval_probes: 24
  bypass_trigger: 5
  human_gate: policy
